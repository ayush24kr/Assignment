name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Job 1: Lint
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Lint Backend
        working-directory: backend
        run: |
          npm ci
          npm run lint

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Worker
        working-directory: worker
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=__pycache__

  # Job 2: Build and Push Docker Images
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/ai-task-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_HUB_USERNAME }}/ai-task-frontend:latest

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/ai-task-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_HUB_USERNAME }}/ai-task-backend:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/ai-task-worker:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_HUB_USERNAME }}/ai-task-worker:latest

  # Job 3: Update Infrastructure
  update-infra:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image: .*/ai-task-frontend:.*|image: ${{ env.DOCKER_HUB_USERNAME }}/ai-task-frontend:${{ env.IMAGE_TAG }}|" infra/base/frontend/deployment.yaml
          sed -i "s|image: .*/ai-task-backend:.*|image: ${{ env.DOCKER_HUB_USERNAME }}/ai-task-backend:${{ env.IMAGE_TAG }}|" infra/base/backend/deployment.yaml
          sed -i "s|image: .*/ai-task-worker:.*|image: ${{ env.DOCKER_HUB_USERNAME }}/ai-task-worker:${{ env.IMAGE_TAG }}|" infra/base/worker/deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }}"
          git push
